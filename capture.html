<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ground Truth Capture</title>
  <style>
    :root{--bg:#f5f5f7;--card:#fff;--text:#111;--muted:#5f5f63;--line:#e5e5ea;--green:#1f9d45;--green2:#19803a;--blue:#0a84ff}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Segoe UI,Roboto,sans-serif}
    .wrap{max-width:640px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 6px 20px #00000008}
    .lang{display:flex;gap:8px;flex-wrap:wrap}
    .lang button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:16px;font-weight:650;cursor:pointer}
    .lang button.active{background:#111;color:#fff;border-color:#111}
    .step{display:inline-block;margin-top:12px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:14px;color:var(--muted);font-weight:700}
    h1{font-size:42px;line-height:1.05;margin:14px 0 10px;font-weight:850;letter-spacing:-.02em}
    .sub{font-size:23px;line-height:1.3;color:#333;margin:0 0 14px}
    .cta{width:100%;min-height:80px;border:none;border-radius:20px;font-size:32px;font-weight:900;cursor:pointer;letter-spacing:-.01em}
    .primary{background:linear-gradient(180deg,var(--green),var(--green2));color:#fff}
    .secondary{margin-top:10px;background:#e5e5ea;color:#222;font-size:28px}
    .helper{font-size:20px;line-height:1.3;margin-top:12px;font-weight:600}
    .helper.warn{color:#b42318}
    .helper.hidden{display:none}
    .status{margin-top:10px;padding:10px 12px;border-radius:12px;font-weight:700;font-size:14px}
    .status.info{background:#f2f8ff;color:#1256a0;border:1px solid #d9e8ff}
    .status.error{background:#fff3f3;color:#b42318;border:1px solid #ffd7d7}
    .status.success{background:#f1fff5;color:#117a35;border:1px solid #cbf0d7}
    .mini{font-size:14px;color:#666;margin-top:8px}
    .hidden{display:none !important}
    .wa-box{margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fcfcfd}
    .wa-label{font-size:18px;font-weight:750;margin-bottom:8px}
    .wa-input{width:100%;height:50px;border-radius:12px;border:1px solid #d8d8dd;padding:0 12px;font-size:18px}
    .wa-note{margin-top:8px;font-size:14px;color:#5f5f63;line-height:1.35}
    .coupon{margin-top:10px;padding:10px;border-radius:12px;background:#fff9e8;border:1px solid #fde8af;font-size:15px;color:#5b4b20;font-weight:650}
    @media (max-width:560px){h1{font-size:36px}.sub{font-size:20px}.cta{font-size:28px;min-height:76px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="lang" id="langBtns"></div>
      <div class="step" id="step"></div>
      <h1 id="title"></h1>
      <p class="sub" id="sub"></p>

      <input id="mediaInput" type="file" accept="image/*,video/*" capture="environment" class="hidden" />
      <button class="cta primary" id="upload" aria-label="Upload"></button>
      <button class="cta secondary" id="submit" disabled></button>

      <div class="helper" id="help"></div>
      <div class="status info" id="status"></div>
      <div class="mini" id="mediaMeta"></div>

      <div class="wa-box hidden" id="waBox">
        <div class="wa-label" id="waTitle"></div>
        <input id="waNumber" class="wa-input" inputmode="numeric" maxlength="10" placeholder="" />
        <div class="wa-note" id="waNote"></div>
        <div class="coupon hidden" id="coupon"></div>
        <button class="cta" style="margin-top:10px;background:var(--blue);color:#fff;font-size:28px;min-height:68px" id="waSave"></button>
      </div>
    </div>
  </div>

  <script>
    const UPLOAD_API_URL='https://mission-control-psi-ten.vercel.app/api/ground-truth/upload';

    const i18n = {
      en:{name:'English',step1:'Step 1 of 2',step2:'Step 2 of 2',title:'Take photo or video',sub:'Capture a clear field or crop photo.',upload:'Upload Photo / Video',submit:'Submit',waitingLoc:'Getting location... please allow GPS access.',locReady:'Location captured. You can submit now.',locError:'Location permission is required before submit.',helpNeedLoc:'Location is required before submit.',pickFirst:'Please choose photo/video first.',submitOk:'Submitted successfully.',submitErr:'Upload failed. Please try again.',submitLoading:'Uploading... this may take a few seconds.',waTitle:'Share WhatsApp number for updates',waPlaceholder:'10 digit WhatsApp number',waNote:'Advisory: We will only send crop advisories and occasional offers. We will never ask for OTP.',waSave:'Save Number',waSaving:'Saving...',waSaved:'WhatsApp number saved on this device.',waSaveErr:'Could not save number. Please try again.',waInvalid:'Enter a valid 10 digit number.'},
      hi:{name:'हिंदी',step1:'2 में से चरण 1',step2:'2 में से चरण 2',title:'फोटो या वीडियो लें',sub:'खेत या फसल की साफ फोटो लें।',upload:'फोटो / वीडियो अपलोड करें',submit:'सबमिट करें',waitingLoc:'लोकेशन ली जा रही है... GPS अनुमति दें।',locReady:'लोकेशन मिल गई। अब सबमिट कर सकते हैं।',locError:'सबमिट से पहले लोकेशन अनुमति जरूरी है।',helpNeedLoc:'सबमिट से पहले लोकेशन अनिवार्य है।',pickFirst:'पहले फोटो/वीडियो चुनें।',submitOk:'सफलतापूर्वक सबमिट हुआ।',submitErr:'अपलोड नहीं हो पाया। फिर से कोशिश करें।',submitLoading:'अपलोड हो रहा है... कुछ सेकंड लग सकते हैं।',waTitle:'अपडेट के लिए WhatsApp नंबर दें',waPlaceholder:'10 अंकों का WhatsApp नंबर',waNote:'सलाह: हम सिर्फ खेती सलाह और कभी-कभी ऑफर भेजेंगे। हम कभी OTP नहीं मांगेंगे।',waSave:'नंबर सेव करें',waSaving:'सेव हो रहा है...',waSaved:'WhatsApp नंबर इस डिवाइस पर सेव हो गया।',waSaveErr:'नंबर सेव नहीं हुआ। दोबारा कोशिश करें।',waInvalid:'कृपया सही 10 अंकों का नंबर दर्ज करें।'},
      pa:{name:'ਪੰਜਾਬੀ',step1:'2 ਵਿੱਚੋਂ ਕਦਮ 1',step2:'2 ਵਿੱਚੋਂ ਕਦਮ 2',title:'ਫੋਟੋ ਜਾਂ ਵੀਡੀਓ ਲਓ',sub:'ਖੇਤ ਜਾਂ ਫਸਲ ਦੀ ਸਾਫ ਫੋਟੋ ਲਓ।',upload:'ਫੋਟੋ / ਵੀਡੀਓ ਅੱਪਲੋਡ ਕਰੋ',submit:'ਸਬਮਿਟ ਕਰੋ',waitingLoc:'ਲੋਕੇਸ਼ਨ ਲਈ ਉਡੀਕ... GPS ਮਨਜ਼ੂਰੀ ਦਿਓ।',locReady:'ਲੋਕੇਸ਼ਨ ਮਿਲ ਗਈ। ਹੁਣ ਸਬਮਿਟ ਕਰ ਸਕਦੇ ਹੋ।',locError:'ਸਬਮਿਟ ਤੋਂ ਪਹਿਲਾਂ ਲੋਕੇਸ਼ਨ ਮਨਜ਼ੂਰੀ ਜ਼ਰੂਰੀ ਹੈ।',helpNeedLoc:'ਸਬਮਿਟ ਤੋਂ ਪਹਿਲਾਂ ਲੋਕੇਸ਼ਨ ਲਾਜ਼ਮੀ ਹੈ।',pickFirst:'ਪਹਿਲਾਂ ਫੋਟੋ/ਵੀਡੀਓ ਚੁਣੋ।',submitOk:'ਸਫਲਤਾਪੂਰਵਕ ਸਬਮਿਟ ਹੋਇਆ।',submitErr:'ਅਪਲੋਡ ਨਹੀਂ ਹੋਇਆ। ਫਿਰ ਕੋਸ਼ਿਸ਼ ਕਰੋ।',submitLoading:'ਅਪਲੋਡ ਹੋ ਰਿਹਾ ਹੈ... ਕੁਝ ਸਕਿੰਟ ਲੱਗ ਸਕਦੇ ਹਨ।',waTitle:'ਅਪਡੇਟ ਲਈ WhatsApp ਨੰਬਰ ਦਿਓ',waPlaceholder:'10 ਅੰਕਾਂ ਦਾ WhatsApp ਨੰਬਰ',waNote:'ਸਲਾਹ: ਅਸੀਂ ਸਿਰਫ ਖੇਤੀ ਸਲਾਹ ਅਤੇ ਕਦੇ-ਕਦੇ ਆਫਰ ਭੇਜਾਂਗੇ। ਅਸੀਂ ਕਦੇ OTP ਨਹੀਂ ਮੰਗਦੇ।',waSave:'ਨੰਬਰ ਸੇਵ ਕਰੋ',waSaving:'ਸੇਵ ਹੋ ਰਿਹਾ ਹੈ...',waSaved:'WhatsApp ਨੰਬਰ ਇਸ ਡਿਵਾਈਸ ਤੇ ਸੇਵ ਹੋ ਗਿਆ।',waSaveErr:'ਨੰਬਰ ਸੇਵ ਨਹੀਂ ਹੋਇਆ। ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।',waInvalid:'ਸਹੀ 10 ਅੰਕਾਂ ਦਾ ਨੰਬਰ ਭਰੋ।'}
    };

    const params=new URLSearchParams(location.search);
    const byId=(id)=>document.getElementById(id);
    const supported=['hi','en','pa'];
    const normalizeLang=(raw)=>{const v=String(raw||'').toLowerCase().trim();if(!v)return '';if(i18n[v])return v;const b=v.split('-')[0];return i18n[b]?b:'';};
    const detectBrowserLang=()=>{const c=[...(navigator.languages||[]),navigator.language].filter(Boolean);for(const x of c){const n=normalizeLang(x);if(n)return n;}return 'hi';};
    const getTopLangs=()=>{const o=[];const add=(code)=>{if(code&&i18n[code]&&!o.includes(code))o.push(code);};add(normalizeLang(params.get('l'))||detectBrowserLang());(navigator.languages||[]).forEach(l=>add(normalizeLang(l)));add(normalizeLang(navigator.language));if(/Asia\//i.test(Intl.DateTimeFormat().resolvedOptions().timeZone||''))add('hi');add('en');supported.forEach(add);return o.slice(0,3);};

    const st={lang:normalizeLang(params.get('l'))||detectBrowserLang(),selectedMedia:null,location:null,submitted:false,submitting:false,sourcePhone:params.get('p')||''};

    function setStatus(kind,msg){const el=byId('status');el.className=`status ${kind}`;el.textContent=msg;}
    function updateHelp(){const t=i18n[st.lang];const el=byId('help');if(st.location){el.className='helper hidden';el.textContent='';}else{el.className='helper warn';el.textContent=t.helpNeedLoc;}}
    function refreshSubmit(){byId('submit').disabled=!(st.selectedMedia&&st.location&&!st.submitted&&!st.submitting);}

    function applyLang(lang){
      st.lang=normalizeLang(lang)||detectBrowserLang();
      const t=i18n[st.lang];
      document.documentElement.lang=st.lang;
      byId('step').textContent=st.submitted?t.step2:t.step1;
      byId('title').textContent=t.title;
      byId('sub').textContent=t.sub;
      byId('upload').textContent=t.upload;
      byId('submit').textContent=st.submitting?t.submitLoading:t.submit;
      byId('waTitle').textContent=t.waTitle;
      byId('waNumber').placeholder=t.waPlaceholder;
      byId('waNote').textContent=t.waNote;
      byId('waSave').textContent=t.waSave;
      [...document.querySelectorAll('#langBtns button')].forEach(b=>b.classList.toggle('active',b.dataset.lang===st.lang));
      updateHelp();
      if(!st.location)setStatus('info',t.waitingLoc);
    }

    function requestLocation(){
      const t=i18n[st.lang];
      setStatus('info',t.waitingLoc);
      if(!navigator.geolocation){setStatus('error',t.locError);updateHelp();return;}
      navigator.geolocation.getCurrentPosition((pos)=>{
        st.location={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,timestamp:new Date(pos.timestamp||Date.now()).toISOString()};
        setStatus('success',t.locReady);
        updateHelp();
        refreshSubmit();
      },()=>{st.location=null;setStatus('error',t.locError);updateHelp();refreshSubmit();},{enableHighAccuracy:true,timeout:12000,maximumAge:0});
    }

    function fileToBase64(file){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>{
          const result=String(reader.result||'');
          const b64=result.includes(',')?result.split(',')[1]:result;
          if(!b64){reject(new Error('Unable to read media file'));return;}
          resolve(b64);
        };
        reader.onerror=()=>reject(new Error('Unable to read media file'));
        reader.readAsDataURL(file);
      });
    }

    async function uploadCapture(file){
      const captureAt=new Date().toISOString();
      const data=await fileToBase64(file);
      const payload={
        phone:st.sourcePhone||undefined,
        data,
        mimeType:file.type||'application/octet-stream',
        fileName:file.name||`capture-${Date.now()}`,
        captureAt,
        location:{
          lat:st.location.lat,
          lng:st.location.lng,
          accuracy:st.location.accuracy??null,
          timestamp:st.location.timestamp||captureAt
        },
        language:st.lang,
        userAgent:navigator.userAgent,
        platform:navigator.platform
      };

      const resp=await fetch(UPLOAD_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      let body=null;
      try{body=await resp.json();}catch{body=null;}
      if(!resp.ok||!body?.ok){
        const msg=body?.error||body?.message||`HTTP ${resp.status}`;
        throw new Error(String(msg));
      }
      return body;
    }

    const langWrap=byId('langBtns');
    getTopLangs().forEach(code=>{const b=document.createElement('button');b.dataset.lang=code;b.textContent=i18n[code].name;b.onclick=()=>applyLang(code);langWrap.appendChild(b);});

    byId('upload').onclick=()=>byId('mediaInput').click();
    byId('mediaInput').addEventListener('change',(e)=>{const file=e.target.files?.[0];if(!file)return;st.selectedMedia=file;byId('mediaMeta').textContent=`${file.name} • ${(file.size/1024/1024).toFixed(2)} MB • ${file.type||'media'}`;refreshSubmit();});

    byId('submit').onclick=async()=>{
      const t=i18n[st.lang];
      if(!st.selectedMedia){setStatus('error',t.pickFirst);return;}
      if(!st.location){setStatus('error',t.locError);return;}

      st.submitting=true;
      byId('submit').textContent=t.submitLoading;
      byId('submit').disabled=true;
      setStatus('info',t.submitLoading);

      try{
        await uploadCapture(st.selectedMedia);
        st.submitted=true;
        byId('step').textContent=t.step2;
        setStatus('success',t.submitOk);
        byId('waBox').classList.remove('hidden');
        if(Math.random()<0.35){byId('coupon').classList.remove('hidden');byId('coupon').textContent='Bonus: Save your WhatsApp number to receive occasional coupon codes on agri inputs.';}
      }catch(err){
        st.submitted=false;
        setStatus('error',`${t.submitErr} ${String(err.message||'').slice(0,140)}`);
      }finally{
        st.submitting=false;
        byId('submit').textContent=t.submit;
        refreshSubmit();
      }
    };

    byId('waSave').onclick=()=>{
      const t=i18n[st.lang];
      const num=byId('waNumber').value.replace(/\D/g,'');
      if(num.length!==10){setStatus('error',t.waInvalid);return;}
      const btn=byId('waSave');
      const input=byId('waNumber');
      btn.disabled=true;
      input.disabled=true;
      btn.textContent=t.waSaving;
      try{
        localStorage.setItem('gt_capture_whatsapp', JSON.stringify({number:num,savedAt:new Date().toISOString(),phoneFromUrl:st.sourcePhone||null,lang:st.lang}));
        setStatus('success',t.waSaved);
      }catch{
        btn.disabled=false;
        input.disabled=false;
        btn.textContent=t.waSave;
        setStatus('error',t.waSaveErr);
        return;
      }
      btn.textContent=t.waSave;
    };

    applyLang(st.lang);
    refreshSubmit();
    requestLocation();
  </script>
</body>
</html>
