<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ground Truth Capture</title>
  <style>
    :root{
      --bg:#f5f5f7;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
      --green:#1f9d45;--green2:#19803a;--blue:#0a84ff;--danger:#b42318;
      --progress-bg:#eceff3;--progress:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Segoe UI,Roboto,sans-serif}
    .wrap{max-width:680px;margin:0 auto;padding:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px #00000008}

    .progress-wrap{margin-bottom:14px}
    .progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:8px}
    .progress-track{height:8px;background:var(--progress-bg);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;background:var(--progress);width:50%;transition:width .28s ease}

    .lang{display:flex;gap:8px;flex-wrap:wrap}
    .lang button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:16px;font-weight:650;cursor:pointer;min-height:48px}
    .lang button.active{background:#111;color:#fff;border-color:#111}

    h1{font-size:40px;line-height:1.08;margin:14px 0 10px;font-weight:850;letter-spacing:-.02em}
    .sub{font-size:22px;line-height:1.34;color:#374151;margin:0 0 14px}
    .cta{width:100%;min-height:64px;border:none;border-radius:18px;font-size:30px;font-weight:850;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:10px}
    .cta:disabled{opacity:.65;cursor:not-allowed}
    .primary{background:linear-gradient(180deg,var(--green),var(--green2));color:#fff}
    .secondary{margin-top:10px;background:#e5e7eb;color:#1f2937;font-size:26px}
    .retry-btn{margin-top:10px;border:1px solid #d1d5db;background:#fff;color:#111827;font-size:18px;font-weight:700;min-height:48px;border-radius:14px;padding:10px 14px;cursor:pointer}

    .helper{font-size:18px;line-height:1.35;margin-top:12px;font-weight:600;color:var(--danger)}
    .helper.hidden{display:none}

    .status{margin-top:10px;padding:11px 12px;border-radius:12px;font-weight:700;font-size:14px}
    .status.info{background:#f2f8ff;color:#1256a0;border:1px solid #d9e8ff}
    .status.error{background:#fff3f3;color:#b42318;border:1px solid #ffd7d7}
    .status.success{background:#f1fff5;color:#117a35;border:1px solid #cbf0d7}

    .mini{font-size:14px;color:#666;margin-top:8px}
    .hidden{display:none !important}

    .media-preview{margin-top:10px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fafafa}
    .thumb{display:block;max-width:140px;max-height:140px;border-radius:10px;border:1px solid #e5e7eb;object-fit:cover}
    .video-meta{font-size:14px;color:#374151;font-weight:600;line-height:1.4}

    .wa-box{margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fcfcfd}
    .wa-label{font-size:18px;font-weight:750;margin-bottom:8px}
    .wa-input{width:100%;height:50px;border-radius:12px;border:1px solid #d8d8dd;padding:0 12px;font-size:18px}
    .wa-note{margin-top:8px;font-size:14px;color:#5f5f63;line-height:1.35}
    .wa-confirm{margin-top:8px;padding:11px 12px;border-radius:12px;background:#f1fff5;border:1px solid #cbf0d7;color:#117a35;font-weight:650}

    .coupon{margin-top:10px;padding:10px;border-radius:12px;background:#fff9e8;border:1px solid #fde8af;font-size:15px;color:#5b4b20;font-weight:650}

    .spinner{width:18px;height:18px;border:2px solid #ffffff88;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:560px){
      h1{font-size:34px}
      .sub{font-size:19px}
      .cta{font-size:25px;min-height:60px}
      .secondary{font-size:23px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="progress-wrap" aria-label="Progress">
        <div class="progress-meta">
          <span id="progressText"></span>
          <span id="progressPercent" aria-hidden="true">50%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="1" aria-valuemax="2" aria-valuenow="1" aria-labelledby="progressText">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="lang" id="langBtns" role="group" aria-label="Language selector"></div>

      <h1 id="title" tabindex="-1"></h1>
      <p class="sub" id="sub"></p>

      <input id="mediaInput" type="file" accept="image/*,video/*" capture="environment" class="hidden" aria-label="Choose photo or video" />
      <button class="cta primary" id="upload" aria-label="Upload photo or video"></button>
      <button class="cta secondary" id="submit" disabled aria-label="Submit capture"></button>

      <div class="media-preview hidden" id="mediaPreview" aria-live="polite">
        <img id="imagePreview" class="thumb hidden" alt="Selected image preview" />
        <div id="videoPreview" class="video-meta hidden"></div>
      </div>

      <div class="helper" id="help"></div>
      <button id="retryLoc" class="retry-btn hidden" type="button"></button>

      <div class="status info" id="status" role="status" aria-live="polite" tabindex="-1"></div>
      <div class="mini" id="mediaMeta"></div>

      <div class="wa-box hidden" id="waBox">
        <div class="wa-label" id="waTitle"></div>
        <input id="waNumber" class="wa-input" inputmode="numeric" maxlength="10" placeholder="" aria-label="WhatsApp number" />
        <div class="wa-note" id="waNote"></div>
        <div class="coupon hidden" id="coupon"></div>
        <button class="cta" style="margin-top:10px;background:var(--blue);color:#fff;font-size:28px;min-height:64px" id="waSave" aria-label="Save WhatsApp number"></button>
        <div class="wa-confirm hidden" id="waConfirm" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      en:{
        name:'English', step1:'Step 1 of 2', step2:'Step 2 of 2', title:'Take photo or video', sub:'Capture a clear field or crop photo.',
        upload:'Upload Photo / Video', submit:'Submit', submitLoading:'Submitting...',
        waitingLoc:'Getting location... please allow GPS access.',
        locReady:'Location captured. You can submit now.',
        locError:'Could not access location. Please allow GPS permission and try again.',
        retryLocation:'Try location again',
        helpNeedLoc:'Location is required before submit.',
        pickFirst:'Please choose photo/video first.',
        submitOk:'Submitted successfully.',
        submitError:'Could not submit. Please try again.',
        noMedia:'No media selected yet.',
        waTitle:'Share WhatsApp number for updates',
        waPlaceholder:'10 digit WhatsApp number',
        waNote:'Advisory: We will only send crop advisories and occasional offers. We will never ask for OTP.',
        waSave:'Save Number',
        waSaved:'WhatsApp number captured.',
        waWarm:'Thank you! We will be in touch with crop advisories.',
        waInvalid:'Enter a valid 10 digit number.'
      },
      hi:{
        name:'हिंदी', step1:'2 में से चरण 1', step2:'2 में से चरण 2', title:'फोटो या वीडियो लें', sub:'खेत या फसल की साफ फोटो लें।',
        upload:'फोटो / वीडियो अपलोड करें', submit:'सबमिट करें', submitLoading:'सबमिट हो रहा है...',
        waitingLoc:'लोकेशन ली जा रही है... GPS अनुमति दें।',
        locReady:'लोकेशन मिल गई। अब सबमिट कर सकते हैं।',
        locError:'लोकेशन नहीं मिल सकी। GPS अनुमति देकर फिर से कोशिश करें।',
        retryLocation:'लोकेशन फिर से लें',
        helpNeedLoc:'सबमिट से पहले लोकेशन अनिवार्य है।',
        pickFirst:'पहले फोटो/वीडियो चुनें।',
        submitOk:'सफलतापूर्वक सबमिट हुआ।',
        submitError:'सबमिट नहीं हो सका। कृपया फिर से कोशिश करें।',
        noMedia:'अभी कोई मीडिया चुना नहीं गया है।',
        waTitle:'अपडेट के लिए WhatsApp नंबर दें',
        waPlaceholder:'10 अंकों का WhatsApp नंबर',
        waNote:'सलाह: हम सिर्फ खेती सलाह और कभी-कभी ऑफर भेजेंगे। हम कभी OTP नहीं मांगेंगे।',
        waSave:'नंबर सेव करें',
        waSaved:'WhatsApp नंबर सेव हो गया।',
        waWarm:'धन्यवाद! हम फसल सलाह के साथ आपसे संपर्क करेंगे।',
        waInvalid:'कृपया सही 10 अंकों का नंबर दर्ज करें।'
      },
      pa:{
        name:'ਪੰਜਾਬੀ', step1:'2 ਵਿੱਚੋਂ ਕਦਮ 1', step2:'2 ਵਿੱਚੋਂ ਕਦਮ 2', title:'ਫੋਟੋ ਜਾਂ ਵੀਡੀਓ ਲਓ', sub:'ਖੇਤ ਜਾਂ ਫਸਲ ਦੀ ਸਾਫ ਫੋਟੋ ਲਓ।',
        upload:'ਫੋਟੋ / ਵੀਡੀਓ ਅੱਪਲੋਡ ਕਰੋ', submit:'ਸਬਮਿਟ ਕਰੋ', submitLoading:'ਸਬਮਿਟ ਹੋ ਰਿਹਾ ਹੈ...',
        waitingLoc:'ਲੋਕੇਸ਼ਨ ਲਈ ਉਡੀਕ... GPS ਮਨਜ਼ੂਰੀ ਦਿਓ।',
        locReady:'ਲੋਕੇਸ਼ਨ ਮਿਲ ਗਈ। ਹੁਣ ਸਬਮਿਟ ਕਰ ਸਕਦੇ ਹੋ।',
        locError:'ਲੋਕੇਸ਼ਨ ਨਹੀਂ ਮਿਲੀ। GPS ਮਨਜ਼ੂਰੀ ਦੇ ਕੇ ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।',
        retryLocation:'ਲੋਕੇਸ਼ਨ ਫਿਰ ਮੰਗੋ',
        helpNeedLoc:'ਸਬਮਿਟ ਤੋਂ ਪਹਿਲਾਂ ਲੋਕੇਸ਼ਨ ਲਾਜ਼ਮੀ ਹੈ।',
        pickFirst:'ਪਹਿਲਾਂ ਫੋਟੋ/ਵੀਡੀਓ ਚੁਣੋ।',
        submitOk:'ਸਫਲਤਾਪੂਰਵਕ ਸਬਮਿਟ ਹੋਇਆ।',
        submitError:'ਸਬਮਿਟ ਨਹੀਂ ਹੋ ਸਕਿਆ। ਕਿਰਪਾ ਕਰਕੇ ਦੁਬਾਰਾ ਕੋਸ਼ਿਸ਼ ਕਰੋ।',
        noMedia:'ਹਾਲੇ ਕੋਈ ਮੀਡੀਆ ਨਹੀਂ ਚੁਣਿਆ।',
        waTitle:'ਅਪਡੇਟ ਲਈ WhatsApp ਨੰਬਰ ਦਿਓ',
        waPlaceholder:'10 ਅੰਕਾਂ ਦਾ WhatsApp ਨੰਬਰ',
        waNote:'ਸਲਾਹ: ਅਸੀਂ ਸਿਰਫ ਖੇਤੀ ਸਲਾਹ ਅਤੇ ਕਦੇ-ਕਦੇ ਆਫਰ ਭੇਜਾਂਗੇ। ਅਸੀਂ ਕਦੇ OTP ਨਹੀਂ ਮੰਗਦੇ।',
        waSave:'ਨੰਬਰ ਸੇਵ ਕਰੋ',
        waSaved:'WhatsApp ਨੰਬਰ ਸੇਵ ਹੋ ਗਿਆ।',
        waWarm:'ਧੰਨਵਾਦ! ਅਸੀਂ ਫਸਲ ਸਲਾਹ ਨਾਲ ਤੁਹਾਡੇ ਨਾਲ ਸੰਪਰਕ ਕਰਾਂਗੇ।',
        waInvalid:'ਸਹੀ 10 ਅੰਕਾਂ ਦਾ ਨੰਬਰ ਭਰੋ।'
      }
    };

    const supported=['hi','en','pa'];
    const params=new URLSearchParams(location.search);

    function normalizeLang(raw){
      const value=String(raw||'').toLowerCase().trim();
      if(!value) return '';
      if(i18n[value]) return value;
      const base=value.split('-')[0];
      return i18n[base] ? base : '';
    }

    function detectBrowserLang(){
      const candidates=[...(navigator.languages||[]), navigator.language].filter(Boolean);
      for(const c of candidates){
        const n=normalizeLang(c);
        if(n) return n;
      }
      return 'hi';
    }

    function getTopLangs(){
      const ordered=[];
      const add=(code)=>{ if(code && i18n[code] && !ordered.includes(code)) ordered.push(code); };
      add(normalizeLang(params.get('l')) || detectBrowserLang());
      (navigator.languages||[]).forEach(l=>add(normalizeLang(l)));
      add(normalizeLang(navigator.language));
      const tz=Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      if(/Asia\//i.test(tz)) add('hi');
      add('en');
      supported.forEach(add);
      return ordered.slice(0,3);
    }

    const langs=getTopLangs();
    const legacyLang=normalizeLang(params.get('l'));
    let l=legacyLang || detectBrowserLang();

    const cleanParams=new URLSearchParams(location.search);
    cleanParams.delete('p');
    cleanParams.delete('l');

    function syncCleanUrl(){
      const query=cleanParams.toString();
      const nextUrl=`${location.pathname}${query?`?${query}`:''}${location.hash||''}`;
      history.replaceState({lang:st.lang},'',nextUrl);
    }

    const byId=(id)=>document.getElementById(id);
    const st={
      lang:l, selectedMedia:null, location:null, submitted:false, payload:null,
      submitting:false, locationDenied:false, lastError:null, imageObjectUrl:null, waSaved:false
    };

    function formatSize(bytes){
      const mb=bytes/(1024*1024);
      if(mb >= 1) return `${mb.toFixed(2)} MB`;
      return `${(bytes/1024).toFixed(0)} KB`;
    }

    function focusStatus(){
      requestAnimationFrame(()=>byId('status').focus());
    }

    function setStatus(kind,msg,focus=true){
      const el=byId('status');
      el.className=`status ${kind}`;
      el.textContent=msg;
      if(focus) focusStatus();
    }

    function setProgress(){
      const t=i18n[st.lang];
      const isStep2=st.submitted;
      byId('progressText').textContent=isStep2 ? t.step2 : t.step1;
      byId('progressPercent').textContent=isStep2 ? '100%' : '50%';
      byId('progressFill').style.width=isStep2 ? '100%' : '50%';
      const track=document.querySelector('.progress-track');
      track.setAttribute('aria-valuenow', isStep2 ? '2' : '1');
    }

    function updateHelp(){
      const t=i18n[st.lang];
      const help=byId('help');
      const retryLoc=byId('retryLoc');
      if(st.location){
        help.className='helper hidden';
        help.textContent='';
        retryLoc.classList.add('hidden');
      } else {
        help.className='helper';
        help.textContent=t.helpNeedLoc;
        retryLoc.textContent=t.retryLocation;
        retryLoc.classList.toggle('hidden', !st.locationDenied);
      }
    }

    function renderMediaPreview(file){
      const preview=byId('mediaPreview');
      const image=byId('imagePreview');
      const videoMeta=byId('videoPreview');
      image.classList.add('hidden');
      videoMeta.classList.add('hidden');
      preview.classList.remove('hidden');

      if(st.imageObjectUrl){
        URL.revokeObjectURL(st.imageObjectUrl);
        st.imageObjectUrl=null;
      }

      if(file.type.startsWith('image/')){
        st.imageObjectUrl=URL.createObjectURL(file);
        image.src=st.imageObjectUrl;
        image.classList.remove('hidden');
      } else {
        videoMeta.textContent=`${file.name} • ${formatSize(file.size)} • video`;
        videoMeta.classList.remove('hidden');
      }
    }

    function setInteractiveDisabled(disabled){
      byId('upload').disabled=disabled;
      byId('mediaInput').disabled=disabled;
      byId('submit').disabled=disabled || !(st.selectedMedia && st.location && !st.submitted);
      byId('retryLoc').disabled=disabled;
      [...document.querySelectorAll('#langBtns button')].forEach(b=>b.disabled=disabled);
      byId('waNumber').disabled=disabled || st.waSaved;
      byId('waSave').disabled=disabled || st.waSaved;
    }

    function refreshSubmit(){
      byId('submit').disabled=st.submitting || !(st.selectedMedia && st.location && !st.submitted);
    }

    function applyLang(lang){
      st.lang=normalizeLang(lang) || detectBrowserLang();
      document.documentElement.lang=st.lang;
      document.body.dataset.captureLang=st.lang;
      const t=i18n[st.lang];

      byId('title').textContent=t.title;
      byId('sub').textContent=t.sub;
      byId('upload').textContent=t.upload;
      byId('submit').textContent=st.submitting ? t.submitLoading : t.submit;
      byId('waTitle').textContent=t.waTitle;
      byId('waNumber').placeholder=t.waPlaceholder;
      byId('waNote').textContent=t.waNote;
      byId('waSave').textContent=t.waSave;
      if(byId('waConfirm').textContent){ byId('waConfirm').textContent=t.waWarm; }

      [...document.querySelectorAll('#langBtns button')].forEach(b=>b.classList.toggle('active',b.dataset.lang===st.lang));
      syncCleanUrl();
      setProgress();
      updateHelp();
      if(!st.location) setStatus('info', t.waitingLoc, false);
    }

    function requestLocation(){
      const t=i18n[st.lang];
      st.locationDenied=false;
      updateHelp();
      setStatus('info',t.waitingLoc);
      if(!navigator.geolocation){
        setStatus('error',t.locError);
        st.locationDenied=true;
        updateHelp();
        return;
      }

      navigator.geolocation.getCurrentPosition((pos)=>{
        st.location={
          lat:pos.coords.latitude,
          lng:pos.coords.longitude,
          accuracy:pos.coords.accuracy,
          timestamp:Date.now()
        };
        st.locationDenied=false;
        setStatus('success',t.locReady);
        updateHelp();
        refreshSubmit();
      },()=>{
        setStatus('error',t.locError);
        st.location=null;
        st.locationDenied=true;
        updateHelp();
        refreshSubmit();
      },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
    }

    function getSubmitEndpoint(){
      return params.get('submitUrl') || params.get('api') || '/api/capture';
    }

    async function postCapture(){
      const sourcePhone=params.get('p') || '';
      const submittedAt=new Date().toISOString();
      const payload={
        phone:sourcePhone,
        media:{name:st.selectedMedia.name,size:st.selectedMedia.size,type:st.selectedMedia.type},
        location:{lat:st.location.lat,lng:st.location.lng,timestamp:submittedAt,accuracy:st.location.accuracy},
        language:st.lang
      };

      const formData=new FormData();
      formData.append('media', st.selectedMedia);
      formData.append('payload', JSON.stringify(payload));

      const res=await fetch(getSubmitEndpoint(), { method:'POST', body:formData });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      st.payload=payload;
    }

    const langWrap=byId('langBtns');
    langs.forEach(code=>{
      const b=document.createElement('button');
      b.type='button';
      b.dataset.lang=code;
      b.textContent=i18n[code].name;
      b.setAttribute('aria-label', `Switch language to ${i18n[code].name}`);
      b.onclick=()=>applyLang(code);
      langWrap.appendChild(b);
    });

    byId('upload').onclick=()=>byId('mediaInput').click();

    byId('mediaInput').addEventListener('change',(e)=>{
      const file=e.target.files?.[0];
      if(!file) return;
      st.selectedMedia=file;
      byId('mediaMeta').textContent=`${file.name} • ${formatSize(file.size)} • ${file.type || 'media'}`;
      renderMediaPreview(file);
      setStatus('info', byId('status').textContent || i18n[st.lang].waitingLoc, false);
      refreshSubmit();
      byId('submit').focus();
    });

    byId('retryLoc').onclick=()=>requestLocation();

    byId('submit').onclick=async ()=>{
      const t=i18n[st.lang];
      if(!st.selectedMedia){ setStatus('error',t.pickFirst); return; }
      if(!st.location){ setStatus('error',t.locError); st.locationDenied=true; updateHelp(); return; }

      st.submitting=true;
      st.lastError=null;
      byId('submit').innerHTML=`<span class="spinner" aria-hidden="true"></span><span>${t.submitLoading}</span>`;
      setInteractiveDisabled(true);
      setStatus('info', t.submitLoading, false);

      try {
        await postCapture();
        st.submitted=true;
        setProgress();
        setStatus('success',t.submitOk);
        byId('waBox').classList.remove('hidden');
        byId('waNumber').focus();
        if(Math.random()<0.35){
          byId('coupon').classList.remove('hidden');
          byId('coupon').textContent='Bonus: Save your WhatsApp number to receive occasional coupon codes on agri inputs.';
        }
      } catch (err) {
        st.lastError=err;
        st.submitted=false;
        setStatus('error', t.submitError);
      } finally {
        st.submitting=false;
        byId('submit').textContent=t.submit;
        setInteractiveDisabled(false);
        refreshSubmit();
      }
    };

    byId('waSave').onclick=()=>{
      const t=i18n[st.lang];
      const num=byId('waNumber').value.replace(/\D/g,'');
      if(num.length!==10){ setStatus('error',t.waInvalid); byId('waNumber').focus(); return; }
      if(st.payload){ st.payload.whatsappNumber=num; st.payload.whatsappConsentAt=new Date().toISOString(); }
      st.waSaved=true;
      setStatus('success',t.waSaved);

      byId('waNumber').classList.add('hidden');
      byId('waSave').classList.add('hidden');
      byId('waConfirm').classList.remove('hidden');
      byId('waConfirm').textContent=t.waWarm;
      byId('waConfirm').focus?.();
    };

    applyLang(l);
    refreshSubmit();
    requestLocation();
    byId('title').focus();
  </script>
