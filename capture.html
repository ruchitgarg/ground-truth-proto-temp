<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Capture Prototype</title>
<style>body{margin:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Segoe UI,Roboto,sans-serif;color:#111}.wrap{max-width:560px;margin:20px auto;padding:0 14px}.card{background:#fff;border:1px solid #e6e6eb;border-radius:18px;padding:16px}.pill{display:inline-block;padding:7px 12px;border:1px solid #e6e6eb;border-radius:999px;color:#666;font-size:13px}.h1{font-size:40px;line-height:1.05;font-weight:800;margin:12px 0}.sub{font-size:20px;color:#555;margin:0 0 14px}.btn{width:100%;height:74px;border:none;border-radius:18px;font-size:34px;font-weight:800}.green{background:#21a447;color:#fff}.gray{background:#d1d1d6;color:#8e8e93;margin-top:10px}.helper{font-size:20px;color:#666;margin-top:10px}</style></head>

const i18n={
