<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ground Truth Inbox Prototype</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--bg:#f5f5f7;--card:#fff;--line:#e6e6eb;--text:#111;--muted:#666}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Segoe UI,Roboto,sans-serif;color:var(--text)}
    .top{padding:12px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
    .hero{font-size:22px;font-weight:800}
    .sub{font-size:12px;color:var(--muted)}
    .filters{display:grid;grid-template-columns:repeat(7,minmax(100px,1fr));gap:8px;margin-top:10px}
    .filters input,.filters select,.filters button{height:38px;border-radius:10px;border:1px solid #ddd;padding:0 10px;font-size:13px;background:#fff}
    .filters button{background:#111;color:#fff;font-weight:700;border:0;cursor:pointer}
    .layout{display:grid;grid-template-columns:360px 1fr 380px;gap:10px;height:calc(100vh - 108px);padding:10px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .head{padding:10px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid #eee}
    .list{height:calc(100% - 40px);overflow:auto}
    .card{display:grid;grid-template-columns:72px 1fr;gap:8px;padding:8px;margin:8px;border:1px solid #eee;border-radius:12px;cursor:pointer}
    .card.active{outline:2px solid #11111122}
    .thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;background:#f0f0f2}
    .map{height:calc(100% - 40px)}
    .detail{padding:12px;height:calc(100% - 40px);overflow:auto}
    .chip{display:inline-block;margin-right:6px;margin-top:6px;padding:4px 9px;border:1px solid var(--line);border-radius:999px;background:#f4f4f6;font-size:11px}
    .preview{margin-top:8px;width:100%;max-height:350px;object-fit:cover;border-radius:12px;border:1px solid #eee;background:#f0f0f2}
    .empty{padding:14px;color:var(--muted)}
    @media(max-width:1160px){.filters{grid-template-columns:repeat(3,minmax(100px,1fr))}.layout{grid-template-columns:1fr;height:auto}.panel{min-height:40vh}}
  </style>
</head>
<body>
  <div class="top">
    <div class="hero">Ground Truth Inbox Prototype</div>
    <div class="sub">Top filters, map pins, compact list with click-to-detail preview</div>
    <div class="filters">
      <input id="qPhone" placeholder="Phone" />
      <input id="qState" placeholder="State" />
      <input id="qDistrict" placeholder="District" />
      <select id="qKind"><option value="">Any type</option><option value="image">Image</option><option value="video">Video</option></select>
      <input id="qText" placeholder="Search" />
      <button id="clear">Clear</button>
      <button id="resetView">Reset Map</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel"><div class="head" id="listHead">Uploads</div><div class="list" id="list"></div></div>
    <div class="panel"><div class="head">Map Pins</div><div id="map" class="map"></div></div>
    <div class="panel"><div class="head">Detail Preview</div><div class="detail" id="detail">Select an upload from list or map pin.</div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const data=[
      {id:1,name:'Upload 1',phone:'9501822210',state:'Punjab',district:'Mohali',lat:30.7046,lng:76.7179,kind:'image',img:'https://picsum.photos/seed/farm1/500/320',time:'2026-03-07 21:00'},
      {id:2,name:'Upload 2',phone:'9876543210',state:'Rajasthan',district:'Jaipur',lat:26.9124,lng:75.7873,kind:'image',img:'https://picsum.photos/seed/farm2/500/320',time:'2026-03-07 20:20'},
      {id:3,name:'Upload 3',phone:'9911223344',state:'Haryana',district:'Karnal',lat:29.6857,lng:76.9905,kind:'video',img:'https://picsum.photos/seed/farm3/500/320',time:'2026-03-07 19:48'},
      {id:4,name:'Upload 4',phone:'8873956405',state:'Punjab',district:'Ludhiana',lat:30.9010,lng:75.8573,kind:'image',img:'https://picsum.photos/seed/farm4/500/320',time:'2026-03-07 18:45'},
      {id:5,name:'Upload 5',phone:'8707650811',state:'Uttar Pradesh',district:'Kanpur',lat:26.4499,lng:80.3319,kind:'video',img:'https://picsum.photos/seed/farm5/500/320',time:'2026-03-07 18:00'}
    ];

    const fallback='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260"><rect width="100%" height="100%" fill="%23efeff1"/><text x="50%" y="52%" text-anchor="middle" font-family="sans-serif" font-size="20" fill="%23888">Preview not available</text></svg>';
    const byId=(id)=>document.getElementById(id);
    const map=L.map('map',{zoomControl:true}).setView([27.5,77],5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap'}).addTo(map);

    let current=[], markers=[];

    function esc(v){return String(v??'').replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]))}
    function filters(){return {phone:qPhone.value.trim(),state:qState.value.toLowerCase().trim(),district:qDistrict.value.toLowerCase().trim(),kind:qKind.value,text:qText.value.toLowerCase().trim()}}
    function pass(it,f){
      const blob=(`${it.name} ${it.phone} ${it.state} ${it.district} ${it.kind}`).toLowerCase();
      if(f.phone && !it.phone.includes(f.phone)) return false;
      if(f.state && !it.state.toLowerCase().includes(f.state)) return false;
      if(f.district && !it.district.toLowerCase().includes(f.district)) return false;
      if(f.kind && it.kind!==f.kind) return false;
      if(f.text && !blob.includes(f.text)) return false;
      return true;
    }

    function setDetail(it){
      byId('detail').innerHTML=`
        <img class="preview" src="${esc(it.img)}" onerror="this.src='${fallback}'" alt="Preview"/>
        <div style="margin-top:8px;font-size:20px;font-weight:750">${esc(it.phone)}</div>
        <div class="chip">${esc(it.state)}</div><div class="chip">${esc(it.district)}</div><div class="chip">${esc(it.kind)}</div>
        <div style="margin-top:10px;color:#666">${esc(it.time)}</div>
      `;
      if(it.marker){ map.flyTo(it.marker.getLatLng(),9,{duration:.35}); it.marker.openPopup(); }
    }

    function render(){
      const f=filters();
      current=data.filter(d=>pass(d,f));
      const list=byId('list');
      list.innerHTML='';
      byId('listHead').textContent=`Uploads (${current.length})`;

      markers.forEach(m=>map.removeLayer(m)); markers=[];
      const bounds=[];

      if(!current.length){
        list.innerHTML='<div class="empty">No matching uploads</div>';
        byId('detail').textContent='No result selected.';
        return;
      }

      current.forEach((it,idx)=>{
        const row=document.createElement('div');
        row.className='card'+(idx===0?' active':'');
        row.innerHTML=`<img class="thumb" src="${esc(it.img)}" onerror="this.src='${fallback}'" alt="thumb"/><div><div style="font-weight:700;font-size:13px">${esc(it.phone)}</div><div style="font-size:12px;color:#666">${esc(it.district)}, ${esc(it.state)}</div><div style="font-size:12px;color:#666">${esc(it.time)}</div></div>`;
        row.onclick=()=>{ [...document.querySelectorAll('.card')].forEach(c=>c.classList.remove('active')); row.classList.add('active'); setDetail(it); };
        list.appendChild(row);

        const marker=L.marker([it.lat,it.lng]).addTo(map).bindPopup(`<b>${esc(it.phone)}</b><br>${esc(it.district)}, ${esc(it.state)}`);
        marker.on('click',()=>{
          const all=[...document.querySelectorAll('.card')];
          all.forEach(c=>c.classList.remove('active'));
          const picked=all.find(c=>c.textContent.includes(it.phone));
          if(picked) picked.classList.add('active');
          setDetail(it);
        });
        it.marker=marker;
        markers.push(marker);
        bounds.push([it.lat,it.lng]);
      });

      if(bounds.length){ map.fitBounds(bounds,{padding:[28,28]}); setDetail(current[0]); }
    }

    [qPhone,qState,qDistrict,qKind,qText].forEach(el=>el.addEventListener('input',render));
    clear.onclick=()=>{ qPhone.value=''; qState.value=''; qDistrict.value=''; qKind.value=''; qText.value=''; render(); };
    resetView.onclick=()=>{ map.setView([27.5,77],5); };

    render();
    setTimeout(()=>map.invalidateSize(),120);
  </script>
</body>
</html>
